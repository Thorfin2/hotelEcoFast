<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 625 175">

  <!-- ═══ PICTOGRAMME (fond transparent, version fond sombre) ═══════════ -->

  <!-- ── Voiture (blanc, profil face droite) ── -->
  <g stroke="white" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Carrosserie -->
    <path d="M 8 153 L 8 137 C 8 125 15 115 24 111 L 53 109 C 62 109 72 114 80 123 L 87 137 L 87 153"/>
    <!-- Bas + arches de roues -->
    <path d="M 8 153 L 16 153 A 11 11 0 0 0 38 153 L 54 153 A 11 11 0 0 0 76 153 L 87 153"/>
    <!-- Vitres -->
    <path d="M 23 126 L 28 111 L 53 110 L 70 119 L 70 127 Z"/>
    <!-- Séparation portes -->
    <line x1="49" y1="110" x2="49" y2="147" stroke-width="1.8"/>
    <!-- Phare avant -->
    <line x1="86" y1="132" x2="89" y2="130" stroke-width="2.2"/>
  </g>
  <!-- Roues (remplissage navy pour masquer la caisse) -->
  <circle cx="27" cy="153" r="11" stroke="white" stroke-width="2.6" fill="#0d2233"/>
  <circle cx="65" cy="153" r="11" stroke="white" stroke-width="2.6" fill="#0d2233"/>

  <!-- ── Route courbée (blanc) ── -->
  <path d="M 58 160 C 90 160 112 100 177 91"
        stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- ── Bâtiment 1 (gauche, moyen) ── -->
  <rect x="108" y="87" width="30" height="85" stroke="white" stroke-width="2.2" fill="none"/>
  <rect x="113" y="95"  width="8" height="7" stroke="white" stroke-width="1.3" fill="none"/>
  <rect x="124" y="95"  width="8" height="7" stroke="white" stroke-width="1.3" fill="none"/>
  <rect x="113" y="109" width="8" height="7" stroke="white" stroke-width="1.3" fill="none"/>
  <rect x="124" y="109" width="8" height="7" stroke="white" stroke-width="1.3" fill="none"/>

  <!-- ── Bâtiment 2 (central, le plus haut) ── -->
  <rect x="142" y="39" width="44" height="133" stroke="white" stroke-width="2.2" fill="none"/>
  <rect x="148" y="49"  width="10" height="8" stroke="white" stroke-width="1.3" fill="none"/>
  <rect x="162" y="49"  width="10" height="8" stroke="white" stroke-width="1.3" fill="none"/>
  <rect x="148" y="63"  width="10" height="8" stroke="white" stroke-width="1.3" fill="none"/>
  <rect x="162" y="63"  width="10" height="8" stroke="white" stroke-width="1.3" fill="none"/>
  <rect x="148" y="77"  width="10" height="8" stroke="white" stroke-width="1.3" fill="none"/>
  <rect x="162" y="77"  width="10" height="8" stroke="white" stroke-width="1.3" fill="none"/>
  <!-- Porte -->
  <path d="M 153 172 L 153 155 Q 164 147 175 155 L 175 172"
        stroke="white" stroke-width="1.8" fill="none"/>

  <!-- ── Bâtiment 3 (droite, intermédiaire) ── -->
  <rect x="190" y="67" width="28" height="105" stroke="white" stroke-width="2.2" fill="none"/>
  <rect x="195" y="76"  width="8" height="7" stroke="white" stroke-width="1.3" fill="none"/>
  <rect x="205" y="76"  width="8" height="7" stroke="white" stroke-width="1.3" fill="none"/>
  <rect x="195" y="91"  width="8" height="7" stroke="white" stroke-width="1.3" fill="none"/>
  <rect x="205" y="91"  width="8" height="7" stroke="white" stroke-width="1.3" fill="none"/>

  <!-- ── Épingle de localisation (blanc) ── -->
  <path d="M 164 4 C 151 4 140 14 140 27 C 140 43 164 67 164 67 C 164 67 188 43 188 27 C 188 14 177 4 164 4 Z"
        stroke="white" stroke-width="2" fill="white"/>
  <!-- Cercle intérieur navy -->
  <circle cx="164" cy="27" r="9" fill="#0d2233"/>

  <!-- ── Arcs WiFi (vert) ── -->
  <path d="M 153 19 A 14 14 0 0 1 175 19"
        stroke="#5ab82e" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  <path d="M 146 11 A 22 22 0 0 1 182 11"
        stroke="#5ab82e" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  <path d="M 139 3  A 30 30 0 0 1 189 3"
        stroke="#5ab82e" stroke-width="3.2" fill="none" stroke-linecap="round"/>


  <!-- ═══ LOGOTYPE ════════════════════════════════════════════════════════ -->

  <!-- "CABS" (blanc) -->
  <text x="232" y="116"
        font-family="'Helvetica Neue','Arial Black',Arial,sans-serif"
        font-size="72" font-weight="900"
        fill="white">CABS</text>

  <!--
    "O" vert : arc de ~300° avec gap en bas-à-droite (~60°)
    Centre estimé : x≈442, y≈90  (après "CABS" ≈ 210px à 72px gras)
    Rayon = 26px  → diamètre 52px ≈ hauteur de capitale (72×0.73≈52)
    Points : haut-droite (-30°) → (442+22.5, 90-13) = (465, 77)
             bas-droite  (+30°) → (442+22.5, 90+13) = (465, 103)
    Tracé large arc, sens anti-horaire (sweep=0)
  -->
  <path d="M 465 77 A 26 26 0 1 0 465 103"
        stroke="#5ab82e" stroke-width="11" fill="none" stroke-linecap="round"/>

  <!-- "LU" (blanc) : départ ≈ x_CABS + largeur_O (210+52=262) + 232 = 494 -->
  <text x="494" y="116"
        font-family="'Helvetica Neue','Arial Black',Arial,sans-serif"
        font-size="72" font-weight="900"
        fill="white">LU</text>

  <!-- Tagline -->
  <text x="232" y="147"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="14.5" font-weight="600"
        fill="rgba(255,255,255,0.70)"
        letter-spacing="1.8">SOLUTION INFORMATIQUE TAXI · HÔTELLERIE</text>

</svg>
