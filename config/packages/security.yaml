security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    role_hierarchy:
        ROLE_HOTEL: [ROLE_HOTEL_EMPLOYEE]
        ROLE_ADMIN: [ROLE_HOTEL, ROLE_DRIVER]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_redirect_after_login
                username_parameter: email
                password_parameter: password
                enable_csrf: false
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/mot-de-passe-oublie, roles: PUBLIC_ACCESS }
        - { path: ^/reinitialiser-mot-de-passe, roles: PUBLIC_ACCESS }
        - { path: ^/hotel, roles: ROLE_HOTEL_EMPLOYEE }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/chauffeur, roles: ROLE_DRIVER }
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
