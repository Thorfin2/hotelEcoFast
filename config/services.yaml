parameters:
    app.name: '%env(default:Cabsolu:APP_NAME)%'
    app.base_url: '%env(default:https://cabsolu.fr:APP_BASE_URL)%'
    mailer.host: '%env(MAILER_HOST)%'
    mailer.port: '%env(int:MAILER_PORT)%'
    mailer.username: '%env(MAILER_USERNAME)%'
    mailer.password: '%env(MAILER_PASSWORD)%'
    mailer.from_email: '%env(MAILER_FROM_EMAIL)%'
    mailer.from_name: '%env(MAILER_FROM_NAME)%'
    mailer.encryption: '%env(MAILER_ENCRYPTION)%'
    google_maps.api_key: '%env(GOOGLE_MAPS_API_KEY)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    app.mailer:
        class: Symfony\Component\Mailer\Mailer
        factory: ['App\Mail\SmtpMailerFactory', 'create']
        arguments:
            - '%mailer.host%'
            - '%mailer.port%'
            - '%mailer.username%'
            - '%mailer.password%'
            - '%mailer.encryption%'

    App\Service\PendingEmailSender:
        arguments:
            $mailer: '@app.mailer'
            $mailerFromEmail: '%mailer.from_email%'
            $mailerFromName: '%mailer.from_name%'
            $mailerEnabled: '%env(bool:MAILER_ENABLED)%'

    App\Service\NotificationService:
        arguments:
            $appName: '%app.name%'
            $appBaseUrl: '%app.base_url%'

    App\Command\SendPendingEmailsCommand:
        arguments:
            $resendApiKey: '%env(RESEND_API_KEY)%'
            $mailerFromEmail: '%mailer.from_email%'
            $mailerFromName: '%mailer.from_name%'

    App\Command\TestSmtpCommand:
        arguments:
            $resendApiKey: '%env(RESEND_API_KEY)%'
            $mailerFromEmail: '%mailer.from_email%'
            $mailerFromName: '%mailer.from_name%'
